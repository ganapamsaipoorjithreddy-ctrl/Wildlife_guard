<h2>Report Animal</h2>

<form method="POST" enctype="multipart/form-data">

Name: <input type="text" name="name"><br><br>

Location: <input type="text" name="location"><br><br>

Description:<br>
<textarea name="description"></textarea><br><br>

Upload Image: <input type="file" name="image"><br><br>

Latitude: <input type="text" name="latitude" id="lat"><br>
Longitude: <input type="text" name="longitude" id="lon"><br><br>

<button type="button" onclick="getLocation()">Get Location</button><br><br>

<button type="submit">Submit</button>

</form>

<script>
function getLocation() {
    navigator.geolocation.getCurrentPosition(function(position) {
        document.getElementById("lat").value = position.coords.latitude;
        document.getElementById("lon").value = position.coords.longitude;
    });
}
</script>
